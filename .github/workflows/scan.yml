name: Docker Scout Scan
 
on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dimitriskaragiannis36/hw0-part2-hackintro
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image
        run: docker build -t ghcr.io/dimitriskaragiannis36/hw0-part2-hackintro:latest .

      - name: Push docker image
        run: docker push ghcr.io/dimitriskaragiannis36/hw0-part2-hackintro:latest

      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations,sbom
          image: ghcr.io/dimitriskaragiannis36/hw0-part2-hackintro:latest
          sarif-file: scout.sarif
          output: sbom.spdx.json
          format: spdx
          exit-code: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-report
          path: scout.sarif

      - name: Upload SARIF to security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout.sarif